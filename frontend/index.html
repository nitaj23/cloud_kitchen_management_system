<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CloudKitchen</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <!-- ════ HEADER ════ -->
  <header>
    <div class="logo">Cloud<span>Kitchen</span></div>
    <div class="header-right">
      <div class="user-chip" id="user-chip">
        <span class="user-avatar" id="user-avatar"></span>
        <span id="user-name"></span>
      </div>
      <button class="orders-btn" onclick="toggleOrders()">My Orders</button>
      <button class="cart-btn" onclick="toggleCart()">
        Cart <span class="badge" id="cart-count">0</span>
      </button>
      <button class="logout-btn" onclick="logout()" title="Switch user">↩</button>
    </div>
  </header>

  <!-- ════ CATEGORY FILTERS ════ -->
  <div class="filters">
    <button class="pill active" onclick="filter('all', this)">All</button>
    <button class="pill" onclick="filter('Starters', this)">Starters</button>
    <button class="pill" onclick="filter('Mains', this)">Mains</button>
    <button class="pill" onclick="filter('Rice &amp; Noodles', this)">Rice &amp; Noodles</button>
    <button class="pill" onclick="filter('Desserts', this)">Desserts</button>
    <button class="pill" onclick="filter('Drinks', this)">Drinks</button>
  </div>

  <!-- ════ MENU ════ -->
  <div class="menu-wrap">
    <p class="menu-meta" id="meta"></p>
    <div class="menu-list" id="menu-list">
      <div class="loading">Loading menu…</div>
    </div>
  </div>

  <!-- ════ CART DRAWER ════ -->
  <div class="overlay" id="overlay" onclick="closeAll()"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <h3>Your order</h3>
      <button class="x-btn" onclick="toggleCart()">✕</button>
    </div>
    <div class="drawer-items" id="drawer-items"></div>
    <div class="drawer-foot">
      <div class="total-row">
        <span>Total</span>
        <span id="total">₹0</span>
      </div>
      <button class="order-btn" id="order-btn" onclick="placeOrder()" disabled>
        Place order
      </button>
    </div>
  </div>

  <!-- ════ MY ORDERS DRAWER ════ -->
  <div class="drawer drawer-orders" id="orders-drawer">
    <div class="drawer-head">
      <h3>My Orders</h3>
      <button class="x-btn" onclick="toggleOrders()">✕</button>
    </div>
    <div class="orders-body" id="orders-body">
      <div class="loading">Loading orders…</div>
    </div>
  </div>

  <!-- ════ TOAST ════ -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
